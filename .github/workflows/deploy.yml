name: Deploy to Oracle

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

      - name: Package artifacts
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          # Commit hash'i artifact içine göm — deploy doğrulama için
          echo "${{ github.sha }}" > .next/standalone/.deploy-commit
          tar -czf deploy.tar.gz .next/standalone public prisma/schema.prisma prisma/migrations

      - name: Upload artifacts to Oracle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: deploy.tar.gz
          target: /tmp/

      - name: Deploy on Oracle
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            cd /opt/bbs/crm

            echo ">>> Extract build artifacts"
            tar -xzf /tmp/deploy.tar.gz
            rm /tmp/deploy.tar.gz

            # Deploy commit hash'ini kök dizine kopyala (kolay erişim için)
            cp .next/standalone/.deploy-commit .deploy-commit 2>/dev/null || true

            echo ">>> Apply migrations"
            npx prisma migrate deploy

            echo ">>> Restart app"
            pm2 restart bbs-crm

            echo ">>> DEPLOY TAMAMLANDI"
          script_stop: true

      - name: Health Check (deploy sonrası doğrulama)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            EXPECTED_COMMIT="${{ github.sha }}"
            APP_URL="http://localhost:3000"
            FAIL=0

            echo ">>> [1/4] PM2 durumu"
            pm2 status

            echo ">>> [2/4] Commit doğrulama"
            DEPLOYED=$(cat /opt/bbs/crm/.deploy-commit 2>/dev/null || echo "")
            if [ "$DEPLOYED" = "$EXPECTED_COMMIT" ]; then
              echo "✅ Commit eşleşiyor: ${EXPECTED_COMMIT:0:7}"
            else
              echo "❌ Commit UYUŞMUYOR: sunucu=${DEPLOYED:0:7}, beklenen=${EXPECTED_COMMIT:0:7}"
              FAIL=1
            fi

            echo ">>> [3/4] HTTP health check (10s bekleniyor...)"
            sleep 10
            HTTP="0"
            for i in 1 2 3; do
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$APP_URL/login" 2>/dev/null || echo "0")
              if [ "$HTTP" = "200" ]; then
                echo "✅ HTTP $HTTP — Uygulama canlı"
                break
              fi
              echo "⏳ Deneme $i/3: HTTP $HTTP, 10s bekleniyor..."
              sleep 10
            done
            if [ "$HTTP" != "200" ]; then
              echo "❌ Uygulama yanıt vermiyor (HTTP: $HTTP)"
              FAIL=1
            fi

            echo ">>> [4/4] Disk kontrolü"
            DISK_PCT=$(df / | tail -1 | awk '{print $5}' | tr -d '%')
            if [ "$DISK_PCT" -lt 85 ]; then
              echo "✅ Disk: %$DISK_PCT dolu"
            else
              echo "⚠️  Disk: %$DISK_PCT dolu — dikkat!"
            fi

            echo ""
            if [ "$FAIL" -eq 0 ]; then
              echo "✅ DEPLOY BAŞARILI — Tüm kontroller geçti (commit: ${EXPECTED_COMMIT:0:7})"
            else
              echo "❌ DEPLOY SORUNU TESPIT EDİLDİ"
              exit 1
            fi
          script_stop: true
